services:
  - type: web
    name: job-agent
    runtime: docker
    repo: https://github.com/elfandrifitrah/job-agent
    plan: free
    envVars:
      - key: API_KEY
        value: your-secret-key
      - key: BROWSER_HEADLESS
        value: "true"
      - key: HUMAN_REVIEW_MODE
        value: "true"
      - key: MATCH_THRESHOLD
        value: "0.65"
      - key: MAX_APPLICATIONS_PER_DAY
        value: "20"
      - key: DATA_DIR
        value: /var/data
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chroma
      - key: CV_STORAGE_DIR
        value: /var/data/cvs
      - key: COVER_LETTER_DIR
        value: /var/data/cover_letters
      - key: SCREENSHOTS_DIR
        value: /var/data/screenshots
